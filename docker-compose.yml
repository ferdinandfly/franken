services:
  app:
    build:
      context: .
    container_name: franken_app
    environment:
      APP_ENV: dev
      PORT: 80
      DATABASE_URL: mysql://symfony:symfony@db:3306/app?serverVersion=8.0&charset=utf8mb4
    ports:
      - "8080:80"
    volumes:
      - .:/app
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: franken_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:

